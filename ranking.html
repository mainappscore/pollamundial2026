<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - Polla Mundial 2026</title>
    <link rel="icon" href="copamundial2026.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { padding: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent-color); text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Volver a la polla</a>
    <div class="ranking-public-container">
        <h1 style="text-align:center;color:#ffd700;">🏆 Ranking - Polla Mundial 2026</h1>
        <p class="ranking-subtitle" id="ranking-info">Cargando ranking...</p>
        <div class="ranking-table-wrapper">
            <table class="ranking-public-table" id="ranking-public-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>🥉 Exacto<br>(×5)</th>
                        <th>⚔️ 16avos<br>(×3)</th>
                        <th>🥈 8avos<br>(×5)</th>
                        <th>🏆 Cuartos<br>(×10)</th>
                        <th>🔥 Semis<br>(×12)</th>
                        <th>🏅 Sub<br>(×10)</th>
                        <th>👑 Camp<br>(×15)</th>
                        <th>TOTAL</th>
                    </tr>
                </thead>
                <tbody id="ranking-public-body">
                    <tr><td colspan="10" class="ranking-empty">⏳ El ranking se publicará cuando inicie el torneo</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
    (function() {
        var tbody = document.getElementById("ranking-public-body");
        var info = document.getElementById("ranking-info");
        fetch("ranking.json?t=" + Date.now())
            .then(function(res) {
                if (!res.ok) throw new Error("No disponible");
                return res.json();
            })
            .then(function(data) {
                if (!data.ranking || !data.ranking.length) {
                    tbody.innerHTML = '<tr><td colspan="10" class="ranking-empty">Aún no hay datos</td></tr>';
                    if (info) info.textContent = "Sin datos disponibles";
                    return;
                }
                if (info) {
                    var fecha = data.generado ? new Date(data.generado).toLocaleString("es-CO") : "";
                    info.textContent = data.totalParticipantes + " participantes" + (fecha ? " | Actualizado: " + fecha : "");
                }
                var pts = data.puntuacion || {};
                tbody.innerHTML = data.ranking.map(function(r, i) {
                    var posIcon = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i + 1);
                    var posClass = i === 0 ? "pos-1" : i === 1 ? "pos-2" : i === 2 ? "pos-3" : "";
                    return '<tr class="' + posClass + '">' +
                        '<td class="col-pos">' + posIcon + '</td>' +
                        '<td class="col-name">' + r.nombre + '</td>' +
                        '<td>' + r.marcadorExacto + '<span class="ranking-pts-detail">' + (r.marcadorExacto * (pts.marcadorExacto || 5)) + 'pts</span></td>' +
                        '<td>' + r.ganador16avos + '<span class="ranking-pts-detail">' + (r.ganador16avos * (pts.ganador16avos || 3)) + 'pts</span></td>' +
                        '<td>' + r.ganador8avos + '<span class="ranking-pts-detail">' + (r.ganador8avos * (pts.ganador8avos || 5)) + 'pts</span></td>' +
                        '<td>' + r.ganadorCuartos + '<span class="ranking-pts-detail">' + (r.ganadorCuartos * (pts.ganadorCuartos || 10)) + 'pts</span></td>' +
                        '<td>' + r.ganadorSemis + '<span class="ranking-pts-detail">' + (r.ganadorSemis * (pts.ganadorSemis || 12)) + 'pts</span></td>' +
                        '<td>' + (r.subcampeon ? "✅" : "❌") + '<span class="ranking-pts-detail">' + (r.subcampeon * (pts.subcampeon || 10)) + 'pts</span></td>' +
                        '<td>' + (r.campeon ? "✅" : "❌") + '<span class="ranking-pts-detail">' + (r.campeon * (pts.campeon || 15)) + 'pts</span></td>' +
                        '<td class="col-total">' + r.total + '</td>' +
                        '</tr>';
                }).join("");
            })
            .catch(function() {
                tbody.innerHTML = '<tr><td colspan="10" class="ranking-empty">⏳ El ranking se publicará cuando inicie el torneo</td></tr>';
                if (info) info.textContent = "Ranking no disponible aún";
            });
    })();
    </script>
</body>
</html>
